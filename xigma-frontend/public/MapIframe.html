<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://static.neshan.org/sdk/leaflet/v1.9.4/neshan-sdk/v1.0.8/index.css"/>
    <script src="https://static.neshan.org/sdk/leaflet/v1.9.4/neshan-sdk/v1.0.8/index.js"></script>
    <style>body, #map { height: 100vh; width: 100vw; margin: 0; }</style>
</head>
<body>
    <div id="map"></div>
    <script>
        const map = new L.Map("map", {
            key: "web.65dcd03c27774f60adbebfa70248785b",
            maptype: "dreamy",
            center: [35.699756, 51.338076],
            zoom: 14,
        });
        const marker = L.marker([35.699756, 51.338076]).addTo(map);
        map.on('click', (e) => {
            marker.setLatLng(e.latlng);
            // ارسال مختصات به صفحه اصلی
            window.parent.postMessage({ lat: e.latlng.lat, lng: e.latlng.lng }, "*");
        });
    </script>
</body>
</html>
