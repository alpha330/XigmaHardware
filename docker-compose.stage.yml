version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: marketplace_postgres_stage
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_stage:/var/lib/postgresql/data
    networks:
      - marketplace_network_stage
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: marketplace_redis_stage
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb
    volumes:
      - redis_data_stage:/data
    networks:
      - marketplace_network_stage
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.stage
    container_name: marketplace_backend_stage
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RUN_AS: stage
      DJANGO_SETTINGS_MODULE: config.settings.stage
      SECRET_KEY: ${SECRET_KEY}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    volumes:
      - static_volume_stage:/app/staticfiles
      - media_volume_stage:/app/media
      - logs_volume_stage:/app/logs
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - marketplace_network_stage

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.stage
    container_name: marketplace_celery_worker_stage
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=4
    depends_on:
      - backend
    environment:
      RUN_AS: stage
      SECRET_KEY: ${SECRET_KEY}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - logs_volume_stage:/app/logs
    networks:
      - marketplace_network_stage

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.stage
    container_name: marketplace_celery_beat_stage
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - backend
    environment:
      RUN_AS: stage
      SECRET_KEY: ${SECRET_KEY}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - logs_volume_stage:/app/logs
    networks:
      - marketplace_network_stage

networks:
  marketplace_network_stage:
    driver: bridge

volumes:
  postgres_data_stage:
  redis_data_stage:
  static_volume_stage:
  media_volume_stage:
  logs_volume_stage: