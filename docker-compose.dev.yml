version: '3.8'

# ====================================================
# Marketplace Backend - Development Environment
# ====================================================

services:
  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    container_name: marketplace_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-marketplace_dev}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
      TZ: Asia/Tehran
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    networks:
      - marketplace_network_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-marketplace_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: marketplace_redis_dev
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data_dev:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    networks:
      - marketplace_network_dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  # ==================== MailHog (Email Dummy) ====================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: marketplace_mailhog_dev
    restart: unless-stopped
    platform: linux/amd64  # برای Mac M1/M2
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"   # SMTP port
      - "${MAILHOG_UI_PORT:-8025}:8025"     # Web UI port
    networks:
      - marketplace_network_dev
    environment:
      MH_STORAGE: maildir
      MH_MAILDIR_PATH: /tmp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Django Backend ====================
  backend:
    build:
      context: .
      dockerfile: ./emarket-backend/Dockerfile.dev
    container_name: marketplace_backend_dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      # Environment
      RUN_AS: dev
      DJANGO_SETTINGS_MODULE: config.settings.dev
      
      # Django
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: ${DEBUG:-true}
      
      # Database
      DB_NAME: ${DB_NAME:-marketplace_dev}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: django-db
      
      # Email (MailHog)
      EMAIL_HOST: mailhog
      EMAIL_PORT: 1025
      EMAIL_USE_TLS: "false"
      EMAIL_USE_SSL: "false"
      DEFAULT_FROM_EMAIL: "noreply@marketplace.local"
      
      # Site
      SITE_URL: http://localhost:8000
      SITE_NAME: "Marketplace Dev"
      
      # Allowed Hosts
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      
      # Dev Settings
      CREATE_SUPERUSER: ${CREATE_SUPERUSER:-true}
      LOAD_FIXTURES: ${LOAD_FIXTURES:-false}
      
      # Python
      PYTHONUNBUFFERED: 1
      TZ: Asia/Tehran
      
    volumes:
      # Mount source code for hot reload
      - ./emarket-backend/:/app
      # Named volumes for data persistence
      - static_volume_dev:/app/staticfiles
      - media_volume_dev:/app/media
      - logs_volume_dev:/app/logs
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - marketplace_network_dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
        reservations:
          memory: 512M
          cpus: '0.5'

  # ==================== Celery Worker ====================
  celery_worker:
    build:
      context: .
      dockerfile: ./emarket-backend/Dockerfile.dev
    container_name: marketplace_celery_worker_dev
    restart: unless-stopped
    command: >
      watchmedo auto-restart
      --directory=/app
      --pattern="*.py"
      --recursive
      -- celery -A config worker
      -l info
      --concurrency=4
      --max-tasks-per-child=100
      --time-limit=1800
      --soft-time-limit=1500
    depends_on:
      backend:
        condition: service_healthy
    environment:
      RUN_AS: dev
      DJANGO_SETTINGS_MODULE: config.settings.dev
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      DB_NAME: ${DB_NAME:-marketplace_dev}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      EMAIL_HOST: mailhog
      EMAIL_PORT: 1025
      TZ: Asia/Tehran
    volumes:
      - .:/app
      - logs_volume_dev:/app/logs
    networks:
      - marketplace_network_dev
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ==================== Celery Beat ====================
  celery_beat:
    build:
      context: .
      dockerfile: ./emarket-backend/Dockerfile.dev
    container_name: marketplace_celery_beat_dev
    restart: unless-stopped
    command: >
      celery -A config beat
      -l info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
      --max-interval=300
    depends_on:
      backend:
        condition: service_healthy
    environment:
      RUN_AS: dev
      DJANGO_SETTINGS_MODULE: config.settings.dev
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      DB_NAME: ${DB_NAME:-marketplace_dev}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      TZ: Asia/Tehran
    volumes:
      - .:/app
      - logs_volume_dev:/app/logs
    networks:
      - marketplace_network_dev
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  # ==================== Flower (Celery Monitoring) ====================
  flower:
    image: mher/flower:2.0
    container_name: marketplace_flower_dev
    restart: unless-stopped
    command: >
      celery flower
      --broker=redis://redis:6379/1
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      FLOWER_UNAUTHENTICATED_API: "true"
    networks:
      - marketplace_network_dev

  # ==================== pgAdmin (Optional) ====================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: marketplace_pgadmin_dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@marketplace.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data_dev:/var/lib/pgadmin
    networks:
      - marketplace_network_dev
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools  # فقط با --profile tools اجرا می‌شه

  # ==================== Redis Commander (Optional) ====================
  redis_commander:
    image: rediscommander/redis-commander:latest
    container_name: marketplace_redis_commander_dev
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    networks:
      - marketplace_network_dev
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - tools

# ==================== Networks ====================
networks:
  marketplace_network_dev:
    driver: bridge
    name: marketplace_network_dev
    driver_opts:
      com.docker.network.bridge.name: br-marketplace-dev

# ==================== Volumes ====================
volumes:
  postgres_data_dev:
    name: marketplace_postgres_data_dev
    driver: local
  redis_data_dev:
    name: marketplace_redis_data_dev
    driver: local
  static_volume_dev:
    name: marketplace_static_dev
    driver: local
  media_volume_dev:
    name: marketplace_media_dev
    driver: local
  logs_volume_dev:
    name: marketplace_logs_dev
    driver: local
  pgadmin_data_dev:
    name: marketplace_pgadmin_dev
    driver: local
