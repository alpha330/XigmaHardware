version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: marketplace_postgres_dev
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      POSTGRES_DB: ${DB_NAME:-marketplace_dev}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    networks:
      - marketplace_network_dev

  redis:
    image: redis:7-alpine
    container_name: marketplace_redis_dev
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb
    volumes:
      - redis_data_dev:/data
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    networks:
      - marketplace_network_dev

  mailhog:
    image: mailhog/mailhog:latest
    container_name: marketplace_mailhog_dev
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - marketplace_network_dev

  backend:
    build:
      context: ./emarket-backend
      dockerfile: Dockerfile.dev
    container_name: marketplace_backend_dev
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - EMAIL_HOST=mailhog
      - EMAIL_PORT=1025
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      - postgres
      - redis
      - mailhog
    volumes:
      - ./emarket-backend:/app
      - static_volume_dev:/app/staticfiles
      - media_volume_dev:/app/media
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - marketplace_network_dev

  celery_worker:
    build:
      context: ./emarket-backend
      dockerfile: Dockerfile.dev
    container_name: marketplace_celery_worker_dev
    restart: unless-stopped
    entrypoint: []                          # ✅ ENTRYPOINT رو خالی کن
    command: >
      sh -c "
      sleep 5 &&
      celery -A config worker -l info --concurrency=4
      "
    env_file:
      - .env.dev
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - EMAIL_HOST=mailhog
      - CELERY_BROKER_URL=redis://redis:6379/1
      - DJANGO_SETTINGS_MODULE=config.settings.dev
    depends_on:
      - postgres
      - redis
    volumes:
      - ./emarket-backend:/app
    networks:
      - marketplace_network_dev

  celery_beat:
    build:
      context: ./emarket-backend
      dockerfile: Dockerfile.dev
    container_name: marketplace_celery_beat_dev
    restart: unless-stopped
    entrypoint: []
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env.dev
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      - backend
    volumes:
      - ./emarket-backend:/app
    networks:
      - marketplace_network_dev

  flower:
    image: mher/flower:2.0
    container_name: marketplace_flower_dev
    restart: unless-stopped
    command: >
      celery flower
      --broker=redis://redis:6379/1
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - FLOWER_UNAUTHENTICATED_API=true
    depends_on:
      - redis
      - celery_worker
    networks:
      - marketplace_network_dev
    profiles:
      - tools

networks:
  marketplace_network_dev:
    driver: bridge

volumes:
  postgres_data_dev:
  redis_data_dev:
  static_volume_dev:
  media_volume_dev: